<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="100%" height="100%">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="bike-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#101828" flood-opacity="0.08" />
    </filter>
  </defs>
  
  <g filter="url(#soft-shadow)">
    <!-- Wheels -->
    <!-- Left Wheel -->
    <circle cx="65" cy="115" r="32" fill="none" stroke="#475569" stroke-width="4" />
    <circle cx="65" cy="115" r="28" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
    <circle cx="65" cy="115" r="6" fill="#1e293b" />
    <!-- Spokes -->
    <line x1="65" y1="83" x2="65" y2="147" stroke="#cbd5e1" stroke-width="1" />
    <line x1="33" y1="115" x2="97" y2="115" stroke="#cbd5e1" stroke-width="1" />
    <line x1="42.4" y1="92.4" x2="87.6" y2="137.6" stroke="#cbd5e1" stroke-width="1" />
    <line x1="42.4" y1="137.6" x2="87.6" y2="92.4" stroke="#cbd5e1" stroke-width="1" />

    <!-- Right Wheel -->
    <circle cx="175" cy="115" r="32" fill="none" stroke="#475569" stroke-width="4" />
    <circle cx="175" cy="115" r="28" fill="none" stroke="#cbd5e1" stroke-width="1.5" />
    <circle cx="175" cy="115" r="6" fill="#1e293b" />
    <!-- Spokes -->
    <line x1="175" y1="83" x2="175" y2="147" stroke="#cbd5e1" stroke-width="1" />
    <line x1="143" y1="115" x2="207" y2="115" stroke="#cbd5e1" stroke-width="1" />
    <line x1="152.4" y1="92.4" x2="197.6" y2="137.6" stroke="#cbd5e1" stroke-width="1" />
    <line x1="152.4" y1="137.6" x2="197.6" y2="92.4" stroke="#cbd5e1" stroke-width="1" />

    <!-- Frame -->
    <!-- Rear chain stay & seat stay -->
    <line x1="65" y1="115" x2="115" y2="115" stroke="#475569" stroke-width="4" stroke-linecap="round" />
    <line x1="65" y1="115" x2="110" y2="65" stroke="url(#bike-green)" stroke-width="5" stroke-linecap="round" />
    
    <!-- Main Triangle -->
    <polygon points="115,115 110,65 162,65" fill="none" stroke="url(#bike-green)" stroke-width="6" stroke-linejoin="round" stroke-linecap="round" />
    <line x1="115" y1="115" x2="162" y2="65" stroke="url(#bike-green)" stroke-width="6" stroke-linecap="round" />

    <!-- Front Fork -->
    <line x1="162" y1="65" x2="175" y2="115" stroke="#475569" stroke-width="5" stroke-linecap="round" />

    <!-- Handlebars -->
    <line x1="162" y1="65" x2="160" y2="48" stroke="#334155" stroke-width="4" stroke-linecap="round" />
    <path d="M 160 48 Q 155 42 145 45" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round" />

    <!-- Seat post & Saddle -->
    <line x1="110" y1="65" x2="108" y2="55" stroke="#334155" stroke-width="4" stroke-linecap="round" />
    <path d="M 98 55 L 120 55" stroke="#1e293b" stroke-width="6" stroke-linecap="round" />

    <!-- Pedals & Chainwheel -->
    <circle cx="115" cy="115" r="10" fill="none" stroke="#334155" stroke-width="3" />
    <line x1="115" y1="115" x2="123" y2="130" stroke="#334155" stroke-width="3" stroke-linecap="round" />
    <line x1="119" y1="130" x2="127" y2="130" stroke="#1e293b" stroke-width="4" stroke-linecap="round" />
  </g>
</svg>
